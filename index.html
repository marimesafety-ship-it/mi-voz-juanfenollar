<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MI VOZ — Asistente virtual de Juan Fenollar</title>
  <meta name="description" content="Formación práctica en IA con Claude para PYMEs, autónomos y centros de formación. Habla con MI VOZ y descubre cómo empezar.">
  <meta name="theme-color" content="#1E3A5F">

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/apple-touch-icon-180.png">
  <link rel="manifest" href="/site.webmanifest">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="MI VOZ — Asistente virtual de Juan Fenollar">
  <meta property="og:description" content="Formación práctica en IA con Claude para PYMEs, autónomos y centros de formación. Habla con MI VOZ y descubre cómo empezar.">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MI VOZ — Asistente virtual de Juan Fenollar">
  <meta name="twitter:description" content="Formación práctica en IA con Claude para PYMEs, autónomos y centros de formación. Habla con MI VOZ y descubre cómo empezar.">
  <meta name="twitter:image" content="/og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F8FAFC;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      background: #1E3A5F;
      padding: 18px 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: #ffffff;
      letter-spacing: 0.02em;
    }

    header p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
      letter-spacing: 0.03em;
    }

    #new-chat {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    #new-chat:hover {
      background: rgba(255,255,255,0.1);
      color: #ffffff;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .bubble.bot {
      background: #ffffff;
      border: 1px solid #E2E8F0;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      color: #1a202c;
    }

    .bubble.user {
      background: #B45309;
      color: #ffffff;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .bubble.bot p { margin-bottom: 0.5em; }
    .bubble.bot p:last-child { margin-bottom: 0; }
    .bubble.bot ul, .bubble.bot ol { padding-left: 1.2em; margin: 0.4em 0; }
    .bubble.bot li { margin-bottom: 0.25em; }
    .bubble.bot strong { font-weight: 600; }

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }
    .typing span {
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    #input-area {
      flex-shrink: 0;
      background: #ffffff;
      border-top: 1px solid #E2E8F0;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      resize: none;
      border: 1px solid #CBD5E1;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      line-height: 1.5;
      color: #1a202c;
      background: #F8FAFC;
      outline: none;
      max-height: 130px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: #1E3A5F; }
    #input::placeholder { color: #94a3b8; }

    #send {
      background: #1E3A5F;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }

    #send:hover { background: #16304f; }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 480px) {
      .bubble { max-width: 90%; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>MI VOZ</h1>
    <p>Asistente virtual · Juan Fenollar</p>
  </div>
  <button id="new-chat" title="Nueva conversación" aria-label="Nueva conversación">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
  </button>
</header>

<div id="chat"></div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="Escribe tu mensaje..."></textarea>
  <button id="send">Enviar</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const newChatBtn = document.getElementById('new-chat');

  let historial = [];

  function resetChat() {
    historial = [];
    chat.innerHTML = '';
    addBubble('bot', WELCOME);
    input.focus();
  }

  newChatBtn.addEventListener('click', resetChat);

  const WELCOME = 'Hola, soy MI VOZ, el asistente de Juan Fenollar. Puedo contarte cómo funciona el programa de formación en IA con Claude, para empresas/equipos o para autónomos, y ayudarte a dar el primer paso. ¿En qué puedo ayudarte?';

  function addBubble(role, text) {
    const div = document.createElement('div');
    div.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
    if (role === 'user') {
      div.textContent = text;
    } else {
      div.innerHTML = marked.parse(text);
    }
    chat.appendChild(div);
    chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'bubble bot typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(div);
    chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
    return div;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize();
    sendBtn.disabled = true;

    addBubble('user', text);
    historial.push({ role: 'user', content: text });

    const typing = addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ historial })
      });
      const data = await res.json();
      typing.remove();

      if (data.respuesta) {
        addBubble('bot', data.respuesta);
        historial.push({ role: 'assistant', content: data.respuesta });
      } else {
        addBubble('bot', 'Ha ocurrido un error. Por favor, inténtalo de nuevo.');
      }
    } catch {
      typing.remove();
      addBubble('bot', 'No se ha podido conectar con el servidor. Inténtalo de nuevo.');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 130) + 'px';
  }

  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', send);

  addBubble('bot', WELCOME);
</script>
</body>
</html>
